server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Optional nicer route for the overview page
    location = /overview {
        return 301 /overview.html;
    }

    # Cache fingerprinted assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML files should not be heavily cached
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
